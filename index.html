<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A4E26" />

    <!-- ── Primary meta (default; cada ruta los sobreescribe vía useSEO) ── -->
    <title>Sumak Vida Ecuador — Productos Naturales y Oportunidad Multinivel</title>
    <meta
      name="description"
      content="Productos naturales de bienestar formulados con plantas medicinales ecuatorianas. Únete a la red Sumak Vida Ecuador y construye tu negocio multinivel."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sumak Vida Ecuador S.A." />
    <link rel="canonical" href="https://sumak.com.ec/" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sumak Vida Ecuador" />
    <meta property="og:locale" content="es_EC" />
    <meta property="og:url" content="https://sumak.com.ec/" />
    <meta property="og:title" content="Sumak Vida Ecuador — Productos Naturales y Oportunidad Multinivel" />
    <meta
      property="og:description"
      content="Productos naturales de bienestar formulados con plantas medicinales ecuatorianas. Únete a la red Sumak Vida Ecuador y construye tu negocio multinivel."
    />
    <meta property="og:image" content="https://sumak.com.ec/LOGO_SUMAK.png" />
    <meta property="og:image:alt" content="Sumak Vida Ecuador" />

    <!-- ── Twitter Cards ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sumak Vida Ecuador" />
    <meta
      name="twitter:description"
      content="Productos naturales y oportunidad multinivel en Ecuador."
    />
    <meta name="twitter:image" content="https://sumak.com.ec/LOGO_SUMAK.png" />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/png" href="/LOGO_SUMAK.png" />
    <link rel="apple-touch-icon" href="/LOGO_SUMAK.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <!-- ── Organization JSON-LD (estable para todo el sitio) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sumak Vida Ecuador S.A.",
      "alternateName": "SUMAK",
      "url": "https://sumak.com.ec",
      "logo": "https://sumak.com.ec/LOGO_SUMAK.png",
      "description": "Empresa ecuatoriana de productos naturales de bienestar con plan de negocio multinivel.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "5 de Junio entre Bolívar y Calderón, Edificio Santana, primer piso, Oficina SUMAK",
        "addressLocality": "Babahoyo",
        "addressRegion": "Los Ríos",
        "addressCountry": "EC"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+593-988-447-019",
        "contactType": "customer service",
        "areaServed": "EC",
        "availableLanguage": "Spanish"
      },
      "sameAs": [
        "https://www.facebook.com/Sumak-Vida-Ecuador",
        "https://www.instagram.com/sumakvidaecuador"
      ]
    }
    </script>

    <!-- SPA redirect handler for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body class="bg-[#0F0F0F] text-[#F0F0F0] font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
